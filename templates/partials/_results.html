<div id="results-container" style="display:none; flex-direction:column; align-items:center; width:100%;">

  <!-- Slim progress bar shown after first section arrives while job is still running -->
  <div id="slim-progress" style="display:none; width:80%; max-width:1000px; margin-top:16px; padding:10px 16px; background:var(--bg-slim); border-radius:6px; align-items:center; gap:12px;">
    <span id="slim-stage" style="font-size:.95em; color:var(--text-stage); white-space:nowrap; min-width:180px;"></span>
    <div class="progress" style="flex:1; margin:0;">
      <div class="progress-bar" id="slim-bar"></div>
    </div>
  </div>

  <!-- Error banner (shown if job fails after overlay is dismissed) -->
  <div id="job-error-banner" style="display:none;" class="alert"></div>

  <!-- Row: grammar suggestion (left) + original/translated input (right) -->
  <div style="display:flex; gap:20px; align-items:stretch; flex-wrap:wrap; width:80%; max-width:1000px; margin-top:20px;">
    <div id="section-grammar" style="flex:1; min-width:320px; display:none;"></div>
    <div id="section-input"   style="flex:1; min-width:320px; display:none;"></div>
  </div>

  <!-- Row: hate speech (left) + sentiment (right) -->
  <div style="display:flex; gap:20px; align-items:stretch; flex-wrap:wrap; width:80%; max-width:1000px; margin-top:20px;">
    <div id="section-hate-speech" style="flex:1; min-width:320px; display:none;"></div>
    <div id="section-sentiment"   style="flex:1; min-width:320px; display:none;"></div>
  </div>

  <!-- ABSA (full width) -->
  <div id="section-absa" style="display:none; width:80%; max-width:1000px; margin-top:20px;"></div>

  <!-- Summaries (flex row, two columns) -->
  <div id="section-summaries" style="display:none; width:80%; max-width:1000px; margin-top:20px;"></div>

  <!-- Topics -->
  <div id="section-topics" style="display:none; width:80%; max-width:1000px; margin-top:20px;"></div>

  <!-- SRL (full width) -->
  <div id="section-srl" style="display:none; width:80%; max-width:1000px; margin-top:20px;"></div>

  <!-- Word table (full width) -->
  <div id="section-words-table" style="display:none; width:95%; max-width:1600px; margin-top:20px;"></div>

</div>
